[global]
scheduler = "crond"

# Shared settings inherited by all profiles
[default]

[default.env]
RCLONE_CONFIG = "/root/.config/rclone/rclone.conf"

# ============================================================
# Photos
# ============================================================

# Photos → Hetzner Storage Box (SFTP) — primary disaster recovery
# DISABLED — enable once Hetzner is set up
#
# [photos-hetzner]
# inherit = "default"
# repository = "sftp:{{ .Env.HETZNER_SFTP_USER }}@{{ .Env.HETZNER_SFTP_HOST }}:./restic/photos"
#
# [photos-hetzner.env]
# RESTIC_PASSWORD = "{{ .Env.RESTIC_PHOTOS_PASSPHRASE }}"
#
# [photos-hetzner.backup]
# source = ["/mnt/source/pv/photos"]
# exclude = ["*.DS_Store", "*/.Trash*"]
# schedule = "0 2 * * *"
# tag = ["photos"]
#
# [[photos-hetzner.backup.send-before]]
# url = "{{ .Env.HEALTHCHECKS_PHOTOS_URL }}/start"
# method = "HEAD"
#
# [[photos-hetzner.backup.send-after]]
# url = "{{ .Env.HEALTHCHECKS_PHOTOS_URL }}"
# method = "HEAD"
#
# [[photos-hetzner.backup.send-after-fail]]
# url = "{{ .Env.HEALTHCHECKS_PHOTOS_URL }}/fail"
# method = "HEAD"
#
# [photos-hetzner.forget]
# keep-daily = 7
# keep-weekly = 4
# keep-monthly = 12
# keep-yearly = 3
# prune = true
# schedule = "15 2 * * *"
#
# [photos-hetzner.check]
# read-data-subset = "5%"
# schedule = "0 4 * * 0"

# Photos → OneDrive (rclone) — secondary disaster recovery + plain file sync
[photos-onedrive]
inherit = "default"
repository = "rclone:onedrive:restic/photos"

[photos-onedrive.env]
RESTIC_PASSWORD = "{{ .Env.RESTIC_PHOTOS_PASSPHRASE }}"

[photos-onedrive.backup]
source = ["/mnt/source/pv/photos"]
exclude = ["*.DS_Store", "*/.Trash*"]
schedule = "30 2 * * *"
tag = ["photos"]
run-after = ["rclone sync /mnt/source/pv/photos onedrive:Photos --transfers=4 --checkers=8"]

[[photos-onedrive.backup.send-before]]
url = "{{ .Env.HEALTHCHECKS_PHOTOS_ONEDRIVE_URL }}/start"
method = "HEAD"

[[photos-onedrive.backup.send-after]]
url = "{{ .Env.HEALTHCHECKS_PHOTOS_ONEDRIVE_URL }}"
method = "HEAD"

[[photos-onedrive.backup.send-after-fail]]
url = "{{ .Env.HEALTHCHECKS_PHOTOS_ONEDRIVE_URL }}/fail"
method = "HEAD"

[photos-onedrive.forget]
keep-daily = 7
keep-weekly = 4
keep-monthly = 12
keep-yearly = 3
prune = true
schedule = "45 2 * * *"

[photos-onedrive.check]
read-data-subset = "5%"
schedule = "0 5 * * 0"

