version: '3.8'

services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.6
    container_name: jellyfin
    restart: unless-stopped

    ports:
      - "8096:8096"          # HTTP web UI
      # - "8920:8920"        # HTTPS (optional)
      - "1900:1900/udp"      # DLNA discovery
      - "7359:7359/udp"      # Jellyfin client auto-discovery

    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - media:/media:ro

    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  jellyfin_config:
    driver: local
  jellyfin_cache:
    driver: local
  media:
    driver: local
    driver_opts:
      type: cifs
      device: "//192.168.1.111/homedata"
      o: "addr=192.168.1.111,username=${SMB_USER},password=${SMB_PASS},uid=${PUID},gid=${PGID},iocharset=utf8,noperm"
