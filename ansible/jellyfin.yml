---
- name: Deploy Jellyfin
  hosts: ubuntu-01
  become: true

  vars:
    state: present
    jellyfin_dir: /home/ubuntu/jellyfin
    PUID: "{{ lookup('env', 'PUID') }}"
    PGID: "{{ lookup('env', 'PGID') }}"
    TZ: "{{ lookup('env', 'TZ') }}"

  tasks:
    - name: Run docker compose down
      ansible.builtin.command:
        cmd: docker compose down
        chdir: "{{ jellyfin_dir }}"
      when: state == "absent"

    - name: Create jellyfin directory
      ansible.builtin.file:
        path: "{{ jellyfin_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      when: state == "present"

    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: ../docker/jellyfin/docker-compose.yml
        dest: "{{ jellyfin_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
      register: compose_file
      when: state == "present"

    - name: Template .env file
      ansible.builtin.template:
        src: templates/jellyfin.env.j2
        dest: "{{ jellyfin_dir }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: "0600"
      register: env_file
      when: state == "present"

    - name: Run docker compose up
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ jellyfin_dir }}"
      when: state == "present" and (compose_file.changed or env_file.changed)
