services:
  postgresql18:
    image: postgres:18
    container_name: postgresql18
    restart: unless-stopped

    ports:
      - "5432:5432"

    volumes:
      - postgresql_data:/var/lib/postgresql

    environment:
      POSTGRES_USER: ${POSTGRESQL18_USER}
      POSTGRES_PASSWORD: ${POSTGRESQL18_PASSWORD}
      POSTGRES_DB: ${POSTGRESQL18_DBNAME}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgresql_data:
    driver: local
