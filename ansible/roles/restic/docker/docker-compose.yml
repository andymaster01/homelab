services:
  resticprofile:
    image: creativeprojects/resticprofile:latest
    container_name: resticprofile
    restart: unless-stopped
    entrypoint: /bin/sh
    command: ["-c", "resticprofile --no-ansi --config /etc/resticprofile/profiles.toml schedule --all && crond -f"]

    volumes:
      # Resticprofile config
      - ./profiles.toml:/etc/resticprofile/profiles.toml:ro
      - ./profiles.d:/etc/resticprofile/profiles.d:ro

      # SSH key for Hetzner Storage Box (SFTP backend)
      - ./ssh:/root/.ssh:ro

      # rclone config with OneDrive OAuth token (used for restic rclone backend + plain sync)
      # Must be read-write so rclone can persist refreshed OAuth tokens
      - ./rclone:/root/.config/rclone

      # Local restic cache — rebuildable, speeds up incremental runs
      - restic_cache:/root/.cache/restic

      # Source: entire photos-videos NFS dataset (read-only)
      - /mnt/photos-videos-test:/mnt/source/pv:ro

      # Source: Backups root (read-only)
      - /mnt/containers-data/backups:/mnt/source/backups:ro

    extra_hosts:
      - "host-gateway:host-gateway"

    environment:
      RESTIC_PHOTOS_PASSPHRASE: ${RESTIC_PHOTOS_PASSPHRASE}
      RESTIC_VIDEOS_PASSPHRASE: ${RESTIC_VIDEOS_PASSPHRASE}
      HETZNER_SFTP_USER: ${HETZNER_SFTP_USER}
      HETZNER_SFTP_HOST: ${HETZNER_SFTP_HOST}
      HEALTHCHECKS_PHOTOS_HETZNER_URL: ${HEALTHCHECKS_PHOTOS_HETZNER_URL}
      HEALTHCHECKS_PHOTOS_ONEDRIVE_URL: ${HEALTHCHECKS_PHOTOS_ONEDRIVE_URL}
      HEALTHCHECKS_VIDEOS_HETZNER_URL: ${HEALTHCHECKS_VIDEOS_HETZNER_URL}
      HEALTHCHECKS_VIDEOS_ONEDRIVE_URL: ${HEALTHCHECKS_VIDEOS_ONEDRIVE_URL}
      RESTIC_JELLYFIN_PASSPHRASE: ${RESTIC_JELLYFIN_PASSPHRASE}
      HEALTHCHECKS_JELLYFIN_ONEDRIVE_URL: ${HEALTHCHECKS_JELLYFIN_ONEDRIVE_URL}
      JELLYFIN_API_KEY: ${JELLYFIN_API_KEY}

volumes:
  restic_cache:
    driver: local
