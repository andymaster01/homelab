["restic:up"]
description = "Deploy Resticprofile to ubuntu-01 via Ansible"
dir = "ansible"
run = "ansible-playbook playbooks/ubuntu-01.yml --tags restic"

["restic:down"]
description = "Stop and remove Resticprofile containers on ubuntu-01"
dir = "ansible"
run = "ansible-playbook playbooks/ubuntu-01.yml --tags restic -e state=absent"

["restic:status"]
description = "Check Resticprofile container status on ubuntu-01"
dir = "ansible"
run = "ansible app_servers -m command -a 'docker compose -f /home/ubuntu/resticprofile/docker-compose.yml ps'"

["restic:logs"]
description = "Tail Resticprofile logs on ubuntu-01"
run = "ssh ubuntu@192.168.1.130 'docker compose -f /home/ubuntu/resticprofile/docker-compose.yml logs -f'"

["restic:list:profiles"]
description = "List available resticprofile profiles on ubuntu-01"
run = "ssh ubuntu@192.168.1.130 \"docker exec resticprofile resticprofile --no-ansi --config /etc/resticprofile/profiles.toml profiles\""

["restic:exec:backup"]
description = "Run a backup for a given profile on ubuntu-01"
usage = 'arg "<profile>" help="Resticprofile profile name (e.g. jellyfin-onedrive)"'
run = """
ssh ubuntu@192.168.1.130 "docker exec resticprofile resticprofile --no-ansi --config /etc/resticprofile/profiles.toml --name '${usage_profile?}' backup"
"""

["restic:list:snapshots"]
description = "List snapshots for a given profile on ubuntu-01"
usage = 'arg "<profile>" help="Resticprofile profile name (e.g. jellyfin-onedrive)"'
run = """
ssh ubuntu@192.168.1.130 "docker exec resticprofile resticprofile --no-ansi --config /etc/resticprofile/profiles.toml --name '${usage_profile?}' snapshots"
"""

["restic:exec:init"]
description = "Initialize a restic repository for a given profile on ubuntu-01 (idempotent)"
usage = 'arg "<profile>" help="Resticprofile profile name (e.g. jellyfin-onedrive)"'
run = """
ssh ubuntu@192.168.1.130 "
  if docker exec resticprofile resticprofile --no-ansi --config /etc/resticprofile/profiles.toml --name '${usage_profile?}' snapshots > /dev/null 2>&1; then
    echo 'Repository for profile ${usage_profile?} already exists, skipping init.'
  else
    echo 'Initializing repository for profile ${usage_profile?}...'
    docker exec resticprofile resticprofile --no-ansi --config /etc/resticprofile/profiles.toml --name '${usage_profile?}' init
  fi
"
"""
