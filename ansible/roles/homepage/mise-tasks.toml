["homepage:up"]
description = "Deploy Homepage to ubuntu-01 via Ansible"
dir = "ansible"
run = "ansible-playbook playbooks/ubuntu-01.yml --tags homepage"

["homepage:down"]
description = "Stop and remove Homepage containers on ubuntu-01"
dir = "ansible"
run = "ansible-playbook playbooks/ubuntu-01.yml --tags homepage -e state=absent"

["homepage:status"]
description = "Check Homepage container status on ubuntu-01"
dir = "ansible"
run = "ansible app_servers -m command -a 'docker compose -f /home/ubuntu/homepage/docker-compose.yml ps'"

["homepage:logs"]
description = "Tail Homepage logs on ubuntu-01"
run = "ssh ubuntu@192.168.1.130 'docker compose -f /home/ubuntu/homepage/docker-compose.yml logs -f'"
