---
- name: Run docker compose down
  ansible.builtin.command:
    cmd: docker compose down
    chdir: "{{ jellyfin_dir }}"
  when: state == "absent"

- name: Create jellyfin directory
  ansible.builtin.file:
    path: "{{ jellyfin_dir }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  when: state == "present"

- name: Copy docker-compose.yml
  ansible.builtin.copy:
    src: "{{ role_path }}/docker/docker-compose.yml"
    dest: "{{ jellyfin_dir }}/docker-compose.yml"
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  register: compose_file
  when: state == "present"

- name: Template .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ jellyfin_dir }}/.env"
    owner: ubuntu
    group: ubuntu
    mode: "0600"
  register: env_file
  when: state == "present"

- name: Create jellyfin backup directory
  ansible.builtin.file:
    path: "{{ jellyfin_backup_dir }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  when: state == "present"

- name: Run docker compose up
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ jellyfin_dir }}"
  when: state == "present" and (compose_file.changed or env_file.changed)
