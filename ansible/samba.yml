---
- name: Mount SMB share
  hosts: ubuntu-01
  become: true

  vars:
    state: present
    smb_share: "{{ lookup('env', 'SMB_SHARE') }}"
    smb_user: "{{ lookup('env', 'SMB_USER') }}"
    smb_pass: "{{ lookup('env', 'SMB_PASS') }}"
    credentials_dir: /etc/samba/credentials
    credentials_file: /etc/samba/credentials/media
    mount_point: /mnt/media

  tasks:
    # ── state=present ──────────────────────────────────────────

    - name: Install cifs-utils
      ansible.builtin.apt:
        name: cifs-utils
        state: present
        update_cache: true
      when: state == "present"
      tags: [packages]

    - name: Create credentials directory
      ansible.builtin.file:
        path: "{{ credentials_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      when: state == "present"
      tags: [credentials]

    - name: Write SMB credentials file
      ansible.builtin.template:
        src: templates/smb-credentials.j2
        dest: "{{ credentials_file }}"
        owner: root
        group: root
        mode: "0600"
      when: state == "present"
      tags: [credentials]

    - name: Create mount point
      ansible.builtin.file:
        path: "{{ mount_point }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: state == "present"
      tags: [mount]

    - name: Mount SMB share via fstab
      ansible.posix.mount:
        src: "{{ smb_share }}"
        path: "{{ mount_point }}"
        fstype: cifs
        opts: "credentials={{ credentials_file }},uid=1000,gid=1000,file_mode=0755,dir_mode=0755,_netdev,nofail"
        state: mounted
      when: state == "present"
      tags: [mount]

    # ── state=absent ───────────────────────────────────────────

    - name: Unmount SMB share and remove fstab entry
      ansible.posix.mount:
        path: "{{ mount_point }}"
        state: absent
      when: state == "absent"
      tags: [unmount]

    - name: Remove credentials file
      ansible.builtin.file:
        path: "{{ credentials_file }}"
        state: absent
      when: state == "absent"
      tags: [unmount]

    - name: Remove credentials directory
      ansible.builtin.file:
        path: "{{ credentials_dir }}"
        state: absent
      when: state == "absent"
      tags: [unmount]
