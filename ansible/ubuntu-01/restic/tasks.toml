["deploy:restic"]
description = "Deploy Resticprofile to ubuntu-01 via Ansible"
dir = "ansible"
run = "ansible-playbook ubuntu-01/restic/restic.yml"

["deploy:restic:down"]
description = "Stop and remove Resticprofile containers on ubuntu-01"
dir = "ansible"
run = "ansible-playbook ubuntu-01/restic/restic.yml -e state=absent"

["deploy:restic:status"]
description = "Check Resticprofile container status on ubuntu-01"
dir = "ansible"
run = "ansible ubuntu-01 -m command -a 'docker compose -f /home/ubuntu/resticprofile/docker-compose.yml ps'"

["deploy:restic:logs"]
description = "Tail Resticprofile logs on ubuntu-01"
run = "ssh ubuntu@192.168.1.130 'docker compose -f /home/ubuntu/resticprofile/docker-compose.yml logs -f'"

["deploy:restic:run"]
description = "Trigger a manual backup run now (photos-onedrive)"
run = "ssh ubuntu@192.168.1.130 'docker exec resticprofile resticprofile --no-ansi --config /etc/resticprofile/profiles.toml -n photos-onedrive backup'"
