["deploy:filebrowser-quantum"]
description = "Deploy FileBrowser Quantum to ubuntu-01 via Ansible"
dir = "ansible"
run = "ansible-playbook ubuntu-01/filebrowser-quantum/filebrowser-quantum.yml"

["deploy:filebrowser-quantum:down"]
description = "Stop and remove FileBrowser Quantum containers on ubuntu-01"
dir = "ansible"
run = "ansible-playbook fubuntu-01/filebrowser-quantum/filebrowser-quantum.yml -e state=absent"

["deploy:filebrowser-quantum:status"]
description = "Check FileBrowser Quantum container status on ubuntu-01"
dir = "ansible"
run = "ansible ubuntu-01 -m command -a 'docker compose -f /home/ubuntu/filebrowser-quantum/docker-compose.yaml ps'"

["deploy:filebrowser-quantum:logs"]
description = "Tail FileBrowser Quantum logs on ubuntu-01"
run = "ssh ubuntu@192.168.1.130 'docker compose -f /home/ubuntu/filebrowser-quantum/docker-compose.yaml logs -f'"

