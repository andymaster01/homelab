[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[tools]
fnox = "latest"

[env]
_.fnox-env = { tools = true }
POSTGRESQL18_BACKUP_DBS = "default"
HEALTHCHECKS_PG_BACKUP_ONEDRIVE_URL = "https://hc-ping.com/xxx"

[task_config]
includes = [
  "ansible/roles/filebrowser_quantum/mise-tasks.toml",
  "ansible/roles/fileserver_zfs/mise-tasks.toml",
  "ansible/roles/fileserver_nfs/mise-tasks.toml",
  "ansible/roles/fileserver_samba/mise-tasks.toml",
  "ansible/roles/homepage/mise-tasks.toml",
  "ansible/roles/jellyfin/mise-tasks.toml",
  "ansible/roles/nfs_client/mise-tasks.toml",
  "ansible/roles/restic/mise-tasks.toml",
  "ansible/roles/postgresql18/mise-tasks.toml",
  "ansible/roles/pg_backup/mise-tasks.toml",
  "ansible/roles/manga/mise-tasks.toml"
]

[tasks."tf:images:init"]
description = "Initialize the Proxmox images Terraform module"
dir = "terraform/proxmox/images"
run = "terraform init"

[tasks."tf:images:plan"]
description = "Plan changes for Proxmox cloud images"
dir = "terraform/proxmox/images"
run = "terraform plan -var-file=../terraform.tfvars"

[tasks."tf:images:apply"]
description = "Apply changes for Proxmox cloud images"
dir = "terraform/proxmox/images"
run = "terraform apply -var-file=../terraform.tfvars"

[tasks."tf:images:destroy"]
description = "Destroy Proxmox cloud images"
dir = "terraform/proxmox/images"
run = "terraform destroy -var-file=../terraform.tfvars"

[tasks."tf:vms:init"]
description = "Initialize the Proxmox VMs Terraform module"
dir = "terraform/proxmox/vms"
run = "terraform init"

[tasks."tf:vms:plan"]
description = "Plan changes for Proxmox VMs"
dir = "terraform/proxmox/vms"
run = "terraform plan -var-file=../terraform.tfvars"

[tasks."tf:vms:apply"]
description = "Apply changes for Proxmox VMs"
dir = "terraform/proxmox/vms"
run = "terraform apply -var-file=../terraform.tfvars"

[tasks."tf:vms:destroy"]
description = "Destroy Proxmox VMs"
dir = "terraform/proxmox/vms"
run = "terraform destroy -var-file=../terraform.tfvars"

[tasks."deploy:fileserver"]
description = "Deploy full fileserver stack on bahamut (ZFS → NFS → Samba, in order)"
dir = "ansible"
run = "ansible-playbook playbooks/bahamut.yml"

[tasks."deploy:fileserver:status"]
description = "Check Samba and NFS status on bahamut"
dir = "ansible"
run = "ansible file_servers -m shell -a 'systemctl status smbd nfs-kernel-server --no-pager' --become"
