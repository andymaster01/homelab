[env]
_.file = '.env'

[task_config]
includes = [
  "ansible/roles/filebrowser_quantum/mise-tasks.toml",
]

[tasks."tf:images:init"]
description = "Initialize the Proxmox images Terraform module"
dir = "terraform/proxmox/images"
run = "terraform init"

[tasks."tf:images:plan"]
description = "Plan changes for Proxmox cloud images"
dir = "terraform/proxmox/images"
run = "terraform plan -var-file=../terraform.tfvars"

[tasks."tf:images:apply"]
description = "Apply changes for Proxmox cloud images"
dir = "terraform/proxmox/images"
run = "terraform apply -var-file=../terraform.tfvars"

[tasks."tf:images:destroy"]
description = "Destroy Proxmox cloud images"
dir = "terraform/proxmox/images"
run = "terraform destroy -var-file=../terraform.tfvars"

[tasks."tf:vms:init"]
description = "Initialize the Proxmox VMs Terraform module"
dir = "terraform/proxmox/vms"
run = "terraform init"

[tasks."tf:vms:plan"]
description = "Plan changes for Proxmox VMs"
dir = "terraform/proxmox/vms"
run = "terraform plan -var-file=../terraform.tfvars"

[tasks."tf:vms:apply"]
description = "Apply changes for Proxmox VMs"
dir = "terraform/proxmox/vms"
run = "terraform apply -var-file=../terraform.tfvars"

[tasks."tf:vms:destroy"]
description = "Destroy Proxmox VMs"
dir = "terraform/proxmox/vms"
run = "terraform destroy -var-file=../terraform.tfvars"

[tasks."deploy:jellyfin"]
description = "Deploy Jellyfin to ubuntu-01 via Ansible"
dir = "ansible"
run = "ansible-playbook playbooks/ubuntu-01.yml --tags jellyfin"

[tasks."deploy:jellyfin:down"]
description = "Stop and remove Jellyfin containers on ubuntu-01"
dir = "ansible"
run = "ansible-playbook playbooks/ubuntu-01.yml --tags jellyfin -e state=absent"

[tasks."deploy:jellyfin:status"]
description = "Check Jellyfin container status on ubuntu-01"
dir = "ansible"
run = "ansible app_servers -m command -a 'docker compose -f /home/ubuntu/jellyfin/docker-compose.yml ps'"

[tasks."deploy:jellyfin:logs"]
description = "Tail Jellyfin logs on ubuntu-01"
run = "ssh ubuntu@192.168.1.130 'docker compose -f /home/ubuntu/jellyfin/docker-compose.yml logs -f'"

[tasks."deploy:homepage"]
description = "Deploy Homepage to ubuntu-01 via Ansible"
dir = "ansible"
run = "ansible-playbook playbooks/ubuntu-01.yml --tags homepage"

[tasks."deploy:homepage:down"]
description = "Stop and remove Homepage containers on ubuntu-01"
dir = "ansible"
run = "ansible-playbook playbooks/ubuntu-01.yml --tags homepage -e state=absent"

[tasks."deploy:homepage:status"]
description = "Check Homepage container status on ubuntu-01"
dir = "ansible"
run = "ansible app_servers -m command -a 'docker compose -f /home/ubuntu/homepage/docker-compose.yml ps'"

[tasks."deploy:homepage:logs"]
description = "Tail Homepage logs on ubuntu-01"
run = "ssh ubuntu@192.168.1.130 'docker compose -f /home/ubuntu/homepage/docker-compose.yml logs -f'"

[tasks."deploy:restic"]
description = "Deploy Resticprofile to ubuntu-01 via Ansible"
dir = "ansible"
run = "ansible-playbook playbooks/ubuntu-01.yml --tags restic"

[tasks."deploy:restic:down"]
description = "Stop and remove Resticprofile containers on ubuntu-01"
dir = "ansible"
run = "ansible-playbook playbooks/ubuntu-01.yml --tags restic -e state=absent"

[tasks."deploy:fileserver"]
description = "Deploy full fileserver stack on bahamut (ZFS → NFS → Samba, in order)"
dir = "ansible"
run = "ansible-playbook playbooks/bahamut.yml"

[tasks."deploy:fileserver:zfs"]
description = "Create ZFS datasets on bahamut"
dir = "ansible"
run = "ansible-playbook playbooks/bahamut.yml --tags fileserver_zfs"

[tasks."deploy:fileserver:nfs"]
description = "Configure NFS file server on bahamut"
dir = "ansible"
run = "ansible-playbook playbooks/bahamut.yml --tags fileserver_nfs"

[tasks."deploy:fileserver:nfs:down"]
description = "Remove NFS from bahamut"
dir = "ansible"
run = "ansible-playbook playbooks/bahamut.yml --tags fileserver_nfs -e state=absent"

[tasks."deploy:fileserver:samba"]
description = "Configure Samba file server on bahamut"
dir = "ansible"
run = "ansible-playbook playbooks/bahamut.yml --tags fileserver_samba"

[tasks."deploy:fileserver:samba:down"]
description = "Remove Samba from bahamut"
dir = "ansible"
run = "ansible-playbook playbooks/bahamut.yml --tags fileserver_samba -e state=absent"

[tasks."deploy:fileserver:status"]
description = "Check Samba and NFS status on bahamut"
dir = "ansible"
run = "ansible file_servers -m shell -a 'systemctl status smbd nfs-kernel-server --no-pager' --become"

[tasks."deploy:nfs:status"]
description = "Check NFS mount status on ubuntu-01"
dir = "ansible"
run = "ansible app_servers -m shell -a 'mount | grep nfs' --become"
